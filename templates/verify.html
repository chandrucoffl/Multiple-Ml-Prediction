<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        /* Background image setup */
        body {
            background: url("/static/verify.jpg") no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Glassmorphism card */
        .glass-card {
            background: rgba(255, 255, 255, 0.2) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 2rem;
            color: rgb(0, 0, 0);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        input { background: rgba(255,255,255,0.8) !important; }
    </style>
</head>
<body>

<div class="card shadow glass-card" style="width: 350px;">
    <h3 class="text-center">OTP Verification</h3>
    <p class="text-center">OTP sent to <strong>{{ mobile }}</strong></p>
    <p class="text-center" style="font-size: 0.9rem;">Dummy OTP: <strong>{{ otp }}</strong></p>
    
    {% if error %}
        <div class="alert alert-danger" style="background: rgba(255,0,0,0.5); color: white; border: none;">{{ error }}</div>
    {% endif %}
    
    <form action="/verify" method="POST">
        <input type="text" name="otp" class="form-control mb-3" placeholder="Enter 4-digit OTP" required>
        <button type="submit" class="btn btn-warning w-100">Verify</button>
    </form>
</div>

</body>
</html>
