<!DOCTYPE html>
<html>
<head>
  <title>Login - Breast Cancer Prediction</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      background: linear-gradient(135deg, #1F4E79, #2E75B6);
      background:url("/static/login.jpg") no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      border: none;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 420px;
    }
    .card-header {
      background: linear-gradient(135deg, #1F4E79, #2E75B6);
      border-radius: 20px 20px 0 0 !important;
      padding: 2rem;
      text-align: center;
      color: white;
    }
    .form-control {
      border-radius: 10px;
      border: 1.5px solid #dee2e6;
      padding: 0.65rem 1rem;
    }
    .form-control:focus {
      border-color: #2E75B6;
      box-shadow: 0 0 0 3px rgba(46,117,182,0.15);
    }
    .input-group-text {
      border-radius: 10px 0 0 10px;
      background: #EBF5FF;
      border: 1.5px solid #dee2e6;
      border-right: none;
      color: #2E75B6;
    }
    .input-group .form-control { border-radius: 0 10px 10px 0; }
    .btn-login {
      background: linear-gradient(135deg, #1F4E79, #2E75B6);
      color: white; border: none; border-radius: 50px;
      padding: 0.75rem; font-weight: 700; width: 100%;
    }
    .btn-login:hover { opacity: 0.9; color: white; }
  </style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div style="font-size:2.5rem;">🩺</div>
    <h4 class="mb-0 mt-2 fw-bold">Doctor Login</h4>
    <small class="opacity-75">Breast Cancer Prediction System</small>
  </div>
  <div class="card-body p-4">

    {% if request.args.get('registered') %}
    <div class="alert alert-success rounded-3 py-2 small text-center">
      ✅ Account created successfully! Please login with your credentials.
    </div>
    {% endif %}

    {% if error %}
    <div class="alert alert-danger rounded-3 py-2 small">⚠️ {{ error }}</div>
    {% endif %}

    <form action="/login" method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold small text-primary">Username</label>
        <div class="input-group">
          <span class="input-group-text">@</span>
          <input type="text" name="username" class="form-control"
                 placeholder="Enter your username" required/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small text-primary">Password</label>
        <div class="input-group">
          <span class="input-group-text">🔒</span>
          <input type="password" name="password" id="pwd"
                 class="form-control" placeholder="Enter your password" required/>
          <button type="button" class="btn btn-outline-secondary btn-sm"
                  style="border-radius:0 10px 10px 0;border-left:none;"
                  onclick="togglePwd()">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn-login">🔐 Login</button>
    </form>

    <p class="text-center mt-3 mb-0 small text-muted">
      New here? <a href="/signup" class="text-primary fw-bold">Create Doctor Account</a>
    </p>
  </div>
</div>
<script>
function togglePwd() {
  const el = document.getElementById('pwd');
  el.type = el.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
